
<nav class="bg-gray-800 border-b border-gray-700 shadow-md">
  <div class="max-w-7xl mx-auto px-2 sm:px-6">
    <div class="flex items-center justify-between h-45 -ml-2 ">

      <!-- LOGO -->
      <a routerLink="/home" class="flex items-center group ">
        <img
          src="images/logo-improplan.png"
          alt="ImproPlan logo"
          class="h-100 w-auto brightness-0 invert opacity-90 group-hover:opacity-100 transition-opacity duration-200 mt-4 -ml-6"
        />
      </a>

      
      <div class="flex items-center">

        <!-- USUARIO NO AUTENTICADO -->
        @if (!isAuthenticated()) {
          <a
            routerLink="/login"
            class="text-md tracking-widest text-gray-300 hover:text-teal-50 transition-colors duration-200 px-4 py-2 rounded-md hover:bg-gray-700"
          >
            Iniciar sesión / Registro
          </a>
        }

        <!-- USUARIO AUTENTICADO → DESPLEGABLE -->
         
        @if (isAuthenticated()) {
          <div class="relative">

            <!-- Botón trigger -->
            <button
              (click)="toggleDropdown()"
              class="flex items-center gap-2 px-3 py-2 rounded-md text-gray-300 hover:text-teal-50 hover:bg-gray-700 transition-all duration-200 group"
              [attr.aria-expanded]="isDropdownOpen()"
              aria-haspopup="true"
            >
              <!-- Avatar con inicial -->
              <div class="w-8 h-8 rounded-full bg-teal-700 flex items-center justify-center text-white text-sm font-semibold">
                {{ displayName()[0]?.toUpperCase() }}
              </div>

              <!-- Nombre -->
              <span class="text-sm font-medium hidden sm:block">
                Hola, {{ displayName() }}
              </span>

              
            </button>

            <!-- Menú desplegable -->
            @if (isDropdownOpen()) {
              <div
                class="absolute right-0 mt-2 w-52 bg-stone-50 border border-gray-200 rounded-lg shadow-lg z-50 overflow-hidden"
                role="menu"
              >
                <!-- Cabecera del menú -->
                <div class="px-4 py-3 bg-teal-50 border-b border-teal-100">
                  <p class="text-xs text-gray-500">Conectado como</p>
                  <p class="text-sm font-semibold text-gray-700 truncate">{{ currentUser()?.email }}</p>
                </div>

                <!-- Opciones -->
                <div class="py-1">

                  <a
                    routerLink="/perfil"
                    (click)="closeDropdown()"
                    class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-teal-50 hover:text-teal-700 transition-colors duration-150"
                    role="menuitem"
                  >
                    <!-- Icono perfil -->
                    <svg class="w-4 h-4 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/> 
                    </svg>
                    Mi perfil
                  </a>

                  <a
                    routerLink="/favoritos"
                    (click)="closeDropdown()"
                    class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-teal-50 hover:text-teal-700 transition-colors duration-150"
                    role="menuitem"
                  >
                    <!-- Icono favoritos -->
                    <svg class="w-4 h-4 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                    </svg>
                    Favoritos
                  </a>

                  <a
                    routerLink="/publicar-evento"
                    (click)="closeDropdown()"
                    class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-teal-50 hover:text-teal-700 transition-colors duration-150"
                    role="menuitem"
                  >
                    <!-- Icono publicar -->
                    <svg class="w-4 h-4 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 4v16m8-8H4"/>
                    </svg>
                    Publica un evento
                  </a>

                  <!-- Solo visible para ROLE_ADMIN -->
                  <div *hasRole="'ROLE_ADMIN'">
                    <hr class="border-gray-200 mx-3"/>
                    <a
                      routerLink="/admin"
                      (click)="closeDropdown()"
                      class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-teal-50 hover:text-teal-700 transition-colors duration-150"
                      role="menuitem"
                    >
                      <svg class="w-4 h-4 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                      </svg>
                      Panel Admin
                    </a>
                  </div>

                </div>

                <!-- Cerrar sesión -->
                <div class="border-t border-gray-200 py-1">
                  <button
                    (click)="logout()"
                    class="flex items-center gap-3 w-full px-4 py-2.5 text-sm text-red-800 hover:bg-red-50 transition-colors duration-150"
                    role="menuitem"
                  >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    Cerrar sesión
                  </button>
                </div>

              </div>
            }

          </div>
        }

      </div>
    </div>
  </div>
</nav>
