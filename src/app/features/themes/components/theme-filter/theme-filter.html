<div class="w-full grid grid-cols-3 sm:grid-cols-5 gap-px
            bg-black/30 rounded-xl overflow-hidden shadow-xl border border-black/30">

  <!-- Celda "Todas" -->
  <button
    type="button"
    (click)="select('')"
    [class]="selectedTheme() === ''
      ? 'bg-blue-500/70 text-white font-semibold'
      : 'bg-gray-800/40 text-white/60 hover:bg-gray-700/50 hover:text-white'"
    class="px-3 py-4 text-sm text-center backdrop-blur-sm
           transition-all duration-150 cursor-pointer focus:outline-none focus:ring-2 focus:ring-inset focus:ring-blue-400"
  >
    Todas
  </button>

  <!-- Celda por cada temática -->
  @for (theme of themes(); track theme.id) {
    <button
      type="button"
      (click)="select(theme.name)"
      [class]="selectedTheme() === theme.name
        ? 'bg-blue-500/70 text-white font-semibold'
        : 'bg-gray-800/40 text-white/60 hover:bg-gray-700/50 hover:text-white'"
      class="px-3 py-4 text-sm text-center backdrop-blur-sm
             transition-all duration-150 cursor-pointer focus:outline-none focus:ring-2 focus:ring-inset focus:ring-blue-400"
    >
      {{ theme.name }}
    </button>
  }

</div>
